name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            artifact: hikari-desktop-macos
          - name: windows
            os: windows-latest
            artifact: hikari-desktop-windows
          - name: linux
            os: ubuntu-22.04
            artifact: hikari-desktop-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Test Go
        run: go test ./...

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build Wails app
        run: wails build -clean

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/**
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts/hikari-desktop-macos
          zip -r ../../Hikari-Desktop-macos.zip .
          cd ../hikari-desktop-windows
          zip -r ../../Hikari-Desktop-windows.zip .
          cd ../hikari-desktop-linux
          tar -czf ../../Hikari-Desktop-linux.tar.gz .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Hikari-Desktop-macos.zip
            Hikari-Desktop-windows.zip
            Hikari-Desktop-linux.tar.gz
