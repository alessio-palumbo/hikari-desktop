name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
            artifact: hikari-macos
            archive: hikari-macos.zip
          - name: windows
            os: windows-latest
            artifact: hikari-windows
            archive: hikari-windows.zip
          - name: linux
            os: ubuntu-22.04
            artifact: hikari-linux
            archive: hikari-linux.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Wails dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Test Go
        run: go test ./...

      - name: Prepare build metadata
        shell: bash
        run: |
          echo "HIKARI_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build Wails app
        run: wails build -clean -ldflags "-X main.version=${HIKARI_VERSION}"

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          ditto -c -k --keepParent build/bin/hikari.app release/${{ matrix.archive }}

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path build/bin/* -DestinationPath release/${{ matrix.archive }}

      - name: Package Linux app
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          tar -czf release/${{ matrix.archive }} -C build/bin .

      - name: Upload packaged build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mv artifacts/hikari-macos/hikari-macos.zip .
          mv artifacts/hikari-windows/hikari-windows.zip .
          mv artifacts/hikari-linux/hikari-linux.tar.gz .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hikari-macos.zip
            hikari-windows.zip
            hikari-linux.tar.gz
